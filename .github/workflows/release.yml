name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Rust
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal --target ${{ matrix.target }}
          rustup default stable

      - name: Build
        run: cargo build -p rescope-cli --release --target ${{ matrix.target }}
      - name: Package Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist/rescope-${{ matrix.target }}
          cp target/${{ matrix.target }}/release/rescope dist/rescope-${{ matrix.target }}/
          tar -C dist -czf dist/rescope-${{ matrix.target }}.tar.gz rescope-${{ matrix.target }}
      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/rescope-${{ matrix.target }}
          Copy-Item target/${{ matrix.target }}/release/rescope.exe dist/rescope-${{ matrix.target }}/
          Compress-Archive -Path dist/rescope-${{ matrix.target }} -DestinationPath dist/rescope-${{ matrix.target }}.zip

      - name: Checksum Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd dist
          sha256sum rescope-${{ matrix.target }}.${{ matrix.archive }} > rescope-${{ matrix.target }}.${{ matrix.archive }}.sha256

      - name: Checksum Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-Location dist
          $file = "rescope-${{ matrix.target }}.${{ matrix.archive }}"
          $hash = (Get-FileHash -Algorithm SHA256 $file).Hash.ToLowerInvariant()
          "$hash  $file" | Out-File -Encoding ascii "$file.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: rescope-${{ matrix.target }}
          path: |
            dist/rescope-${{ matrix.target }}.${{ matrix.archive }}
            dist/rescope-${{ matrix.target }}.${{ matrix.archive }}.sha256

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" dist/* \
              --title "rescope $tag" \
              --notes "Release artifacts and SHA-256 checksums for rescope $tag."
          fi
