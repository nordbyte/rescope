name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build -p rescope-cli --release --target ${{ matrix.target }}
      - name: Package Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist/rescope-${{ matrix.target }}
          cp target/${{ matrix.target }}/release/rescope dist/rescope-${{ matrix.target }}/
          tar -C dist -czf dist/rescope-${{ matrix.target }}.tar.gz rescope-${{ matrix.target }}
      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/rescope-${{ matrix.target }}
          Copy-Item target/${{ matrix.target }}/release/rescope.exe dist/rescope-${{ matrix.target }}/
          Compress-Archive -Path dist/rescope-${{ matrix.target }} -DestinationPath dist/rescope-${{ matrix.target }}.zip
      - uses: actions/upload-artifact@v5
        with:
          name: rescope-${{ matrix.target }}
          path: dist/rescope-${{ matrix.target }}.${{ matrix.archive }}
