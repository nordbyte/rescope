name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            native_dir: linux-x64
            exe: rescope
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            native_dir: linux-arm64
            exe: rescope
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
            native_dir: darwin-x64
            exe: rescope
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            native_dir: darwin-arm64
            exe: rescope
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            native_dir: win32-x64
            exe: rescope.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Rust
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal --target ${{ matrix.target }}
          rustup default stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build
        run: cargo build -p rescope-cli --release --target ${{ matrix.target }}
      - name: Package Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist/rescope-${{ matrix.target }}
          cp target/${{ matrix.target }}/release/rescope dist/rescope-${{ matrix.target }}/
          tar -C dist -czf dist/rescope-${{ matrix.target }}.tar.gz rescope-${{ matrix.target }}
      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/rescope-${{ matrix.target }}
          Copy-Item target/${{ matrix.target }}/release/rescope.exe dist/rescope-${{ matrix.target }}/
          Compress-Archive -Path dist/rescope-${{ matrix.target }} -DestinationPath dist/rescope-${{ matrix.target }}.zip

      - name: Checksum Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd dist
          sha256sum rescope-${{ matrix.target }}.${{ matrix.archive }} > rescope-${{ matrix.target }}.${{ matrix.archive }}.sha256

      - name: Checksum Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-Location dist
          $file = "rescope-${{ matrix.target }}.${{ matrix.archive }}"
          $hash = (Get-FileHash -Algorithm SHA256 $file).Hash.ToLowerInvariant()
          "$hash  $file" | Out-File -Encoding ascii "$file.sha256"

      - name: Pack native npm package
        shell: bash
        run: |
          set -euo pipefail
          package_dir="dist/npm/${{ matrix.native_dir }}"
          mkdir -p "$package_dir/bin"
          cp "npm/native/${{ matrix.native_dir }}/package.json" "$package_dir/package.json"
          cp "target/${{ matrix.target }}/release/${{ matrix.exe }}" "$package_dir/bin/${{ matrix.exe }}"
          chmod +x "$package_dir/bin/${{ matrix.exe }}" || true
          npm pack "$package_dir" --pack-destination dist

      - uses: actions/upload-artifact@v4
        with:
          name: rescope-${{ matrix.target }}
          path: |
            dist/rescope-${{ matrix.target }}.${{ matrix.archive }}
            dist/rescope-${{ matrix.target }}.${{ matrix.archive }}.sha256
            dist/*.tgz

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" dist/* \
              --title "rescope $tag" \
              --notes "Release artifacts and SHA-256 checksums for rescope $tag."
          fi

  publish-npm:
    name: Publish npm packages
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') && vars.PUBLISH_NPM == 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download native packages
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Publish native packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          for package in dist/*.tgz; do
            npm publish "$package" --access public
          done

      - name: Publish wrapper package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish npm/rescope --access public

  publish-cargo:
    name: Publish Cargo crates
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') && vars.PUBLISH_CARGO == 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Publish rescope-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p rescope-core

      - name: Publish rescope-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5 6; do
            if cargo publish -p rescope-cli; then
              exit 0
            fi
            echo "rescope-cli publish attempt ${attempt} failed; waiting for registry index"
            sleep 30
          done
          cargo publish -p rescope-cli
