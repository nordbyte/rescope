name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Rust
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            docs/package-lock.json
            npm/rescope/package-lock.json

      - name: Format
        run: cargo fmt --all -- --check

      - name: Check
        run: cargo check --workspace --locked

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --locked

      - name: Build CLI binary
        run: cargo build -p rescope-cli --locked

      - name: Install docs dependencies
        run: npm ci --prefix docs --no-audit --no-fund

      - name: Check docs links and CLI coverage
        run: npm run docs:check

      - name: Build docs
        run: npm --prefix docs run build

      - name: npm wrapper tests
        run: npm run npm:test

      - name: Snapshot smoke
        run: target/debug/rescope snapshot --limit 5

      - name: Record smoke
        run: target/debug/rescope record --duration 3s --interval 1s --limit 5

      - name: Completion and manpage smoke
        run: |
          target/debug/rescope completions bash >/tmp/rescope.bash
          target/debug/rescope man >/tmp/rescope.1
          test -s /tmp/rescope.bash
          test -s /tmp/rescope.1

      - name: npm wrapper smoke
        run: npm run npm:smoke

      - name: TUI PTY smoke
        shell: bash
        run: |
          set +e
          script -qec "timeout 3s target/debug/rescope live --tui --interval 250ms --limit 5" /tmp/rescope-tui.log
          status=$?
          set -e
          if [ "$status" -ne 0 ] && [ "$status" -ne 124 ]; then
            cat /tmp/rescope-tui.log
            exit "$status"
          fi
          grep -q "rescope live" /tmp/rescope-tui.log

  cross-platform:
    name: Smoke ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Build
        run: cargo build --workspace --locked

      - name: Snapshot smoke
        run: cargo run -p rescope-cli --locked -- snapshot --limit 5
