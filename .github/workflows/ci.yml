name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Docs check
        run: npm run docs:check
      - name: Snapshot smoke
        run: cargo run -p rescope-cli -- snapshot --limit 5
      - name: Record smoke
        run: cargo run -p rescope-cli -- record --duration 3s --interval 1s --limit 5
